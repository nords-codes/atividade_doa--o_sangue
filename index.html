<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação de Sangue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="" id="formulario">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" placeholder="Insira seu nome completo">
        <div id="erroNome" class="erro"></div>

        <label for="email">Email:</label>
        <input type="email" name="" id="email" placeholder="insira seu email">
        <div id="erroEmail" class="erro"></div>

        <label for="idade">idade</label>
        <input type="number" id="idade" placeholder="insira sua idade">
        <div id="erroIdade" class="erro"></div>

        <label for="peso">Insira seu peso</label>
        <input type="number" id="peso" placeholder="Insira seu peso ex:70,00">
        <div id="erroPeso" class="erro"></div>

        <label for="sangue">Insira seu tipo sanguine</label>
        <select name="Tipo de sangue" id="sangue">
            <option value="A+"></option>
            <option value="A-"></option>
            <option value="B+"></option>
            <option value="B-"></option>
            <option value="AB+"></option>
            <option value="AB-"></option>
            <option value="O+"></option>
            <option value="O-"></option>
        </select>

        <label for="telefone">Insira seu telefone</label>
        <input type="tel" id="telefone" placeholder="ex:55 9999-9999">
    </form>
</body>
</html>

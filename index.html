<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação de Sangue</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <h2 id="Titulo">Cadastro doação de Sangue</h2>
        <div id="base">
            <form action="" id="formulario">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="Insira seu nome completo" required>
                <div id="erroNome" class="erro"></div>

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Insira seu email" required>
                <div id="erroEmail" class="erro"></div>

                <label for="idade">Idade</label>
                <input type="number" id="idade" placeholder="Insira sua idade" required>
                <div id="erroIdade" class="erro"></div>

                <label for="peso">Insira seu peso</label>
                <input type="number" id="peso" placeholder="Insira seu peso ex:70,00" required>
                <div id="erroPeso" class="erro"></div>

                <label for="sangue">Insira seu tipo sanguineo</label>
                <select name="Tipo_sangue" id="sangue" required>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
                <div id="erroSangue" class="ero"></div>

                <label for="telefone">Insira seu telefone</label>
                <input type="number" id="telefone" placeholder="Ex:55 9999-9999" required>
                <div id="erroTelefone" class="erro"></div>

                <label for="cidade">Insira a cidade onde mora</label>
                <input type="text" id="cidade" placeholder="Ex:Joinville" required>
                <div id="erroCidade" class="erro"></div>

                <label for="estado">Insira seu estado</label>
                <input type="text" name="" id="estado" placeholder="Ex:Parana" required>
                <div id="erroEstado" class="erro"></div>
                <button type="submit">Enviar</button>
            </form>

            <div id="resultado"></div>
        </div>
    </main>


</body>
<script src="script.js"></script>

</html>
